openapi: 3.1.0
info:
  title: Ajayji Local SDK API
  version: 1.0.1
  description: Local daemon API for the Ajayji application, allowing native Python SDK integration for Data Scientists and developers.
servers:
  - url: http://localhost:14321
    description: Default Local Ajayji Daemon
paths:
  /ask:
    post:
      summary: Ask the active LLM a question statelessly
      description: Executes a query against the currently loaded active model. Bypasses Persona parsing unless an agent_id is provided.
      operationId: ask
      tags:
        - Stateless Execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: The prompt to send to the local model.
                agent_id:
                  type: string
                  nullable: true
                  description: Optional ID of the Persona to route this query through.
      responses:
        '200':
          description: Successful response from the LLM
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
        '400':
          description: Bad request or no model loaded
        '500':
          description: Internal server error

  /run:
    post:
      summary: Load a model into active memory
      description: Manually loads a specified model file into Mac RAM/VRAM.
      operationId: load_model
      tags:
        - Memory Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fileName
              properties:
                fileName:
                  type: string
                  description: The filename of the model (e.g. `llama-3-8b.gguf`).
      responses:
        '200':
          description: Model loaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '500':
          description: Error loading model

  /stop:
    post:
      summary: Unload the active model from memory
      description: Clears the active model from RAM, freeing up system resources.
      operationId: stop_model
      tags:
        - Memory Management
      responses:
        '200':
          description: Model unloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '500':
          description: Error stopping model

  /personas/{id}/invoke:
    post:
      summary: Invoke a Persona Webhook
      description: Executes a full orchestration pipeline (Tools, JS Parsers, CoreML) for a specific Persona using a JSON payload.
      operationId: invoke_persona
      tags:
        - Persona Orchestration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the ChatPersona to invoke.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: A flexible JSON payload that will be parsed by the Persona's input_parser script.
      responses:
        '200':
          description: Successful workflow execution
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    additionalProperties: true
                    description: The final parsed output from the Persona's output_parser script.
        '400':
          description: Bad request (e.g., payload not JSON)
        '403':
          description: Webhooks are disabled for this Persona
        '404':
          description: Persona not found
        '500':
          description: Internal execution error

  /pull:
    post:
      summary: Download a model from Hugging Face
      description: Triggers a background download of a model to local storage.
      operationId: pull_model
      tags:
        - Model Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repo
                - fileName
              properties:
                repo:
                  type: string
                  description: The Hugging Face repository (e.g., `unsloth/gemma-2b`).
                fileName:
                  type: string
                  description: The exact filename to download (e.g., `model.gguf`).
                huggingface_config_id:
                  type: string
                  nullable: true
                  description: Optional ID for an authenticated Hugging Face token.
      responses:
        '200':
          description: Download started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /databases/create:
    post:
      summary: Provision a Local Database Tool
      description: Ingests a CSV file into the local Sembast database and auto-provisions it as a `toml-database` Tool.
      operationId: create_database
      tags:
        - Data Ingestion & Tools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - csv_path
              properties:
                name:
                  type: string
                  description: The human-readable name of the new database tool.
                csv_path:
                  type: string
                  description: The absolute file path to the CSV file on the local machine.
      responses:
        '200':
          description: Database created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '500':
          description: Internal server error

  /vector-dbs/create:
    post:
      summary: Provision a Vector DB Tool
      description: Indexes a local folder of documents into a Vector Database and auto-provisions it as a `toml-vector-store` Tool.
      operationId: create_vector_db
      tags:
        - Data Ingestion & Tools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - folder_path
                - embedding_model
              properties:
                name:
                  type: string
                  description: The human-readable name of the new vector DB tool.
                folder_path:
                  type: string
                  description: The absolute file path to the folder containing documents to index.
                embedding_model:
                  type: string
                  description: The filename of the active GGUF model to use for embeddings (e.g. `all-MiniLM-L6-v2-gguf.gguf`).
      responses:
        '200':
          description: Vector DB created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '500':
          description: Internal server error

  /tools/execute:
    post:
      summary: Execute a Tool Statelessly
      description: Programmatically executes a registered tool (e.g. Database, Vector Store, CoreML model) and returns the JSON result.
      operationId: execute_tool
      tags:
        - Data Ingestion & Tools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tool_name
              properties:
                tool_name:
                  type: string
                  description: The registered name of the tool to execute.
                args:
                  type: object
                  additionalProperties: true
                  description: A JSON object containing the arguments required by the tool.
      responses:
        '200':
          description: Tool executed successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Bad request (missing tool_name)
        '404':
          description: Tool not found
        '500':
          description: Internal server error


  /models/convert:
    post:
      summary: Convert Model to CoreML
      description: Headless conversion of a model (e.g., .h5, .pt) to an Apple CoreML `.mlpackage` via the streaming service.
      operationId: convert_model
      tags:
        - Model Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - source_file_path
                - name
                - type
                - input_mapping
                - output_mapping
              properties:
                source_file_path:
                  type: string
                  description: Absolute path to the source model file.
                name:
                  type: string
                  description: Name to register the resulting tool as.
                type:
                  type: string
                  description: The type of model (e.g., 'image', 'text').
                input_mapping:
                  type: string
                  description: The name of the input tensor/layer.
                output_mapping:
                  type: string
                  description: The name of the output tensor/layer.
                width:
                  type: integer
                  nullable: true
                  description: Target width for image models.
                height:
                  type: integer
                  nullable: true
                  description: Target height for image models.
      responses:
        '200':
          description: Streaming conversion logs and final success status
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error